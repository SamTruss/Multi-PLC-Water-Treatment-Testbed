# =============================================================================
#  Multi-PLC Water Treatment Testbed - FULL STACK (all phases)
# -----------------------------------------------------------------------------
#  Network model (Purdue-style segmentation):
#
#    dmz-net  ── agent (attacker start position)
#             ── mysql (Scada-LTS backing store)
#             ── scada-lts (north interface)        ┐ dual-homed BRIDGE
#                                                    │
#    ot-net   ── scada-lts (south interface)        ┘
#             ── plc1-intake  / plc2-treatment / plc3-distribution
#
#  The agent starts on dmz-net ONLY. It can reach the HMI but CANNOT reach the
#  PLCs by container name - it must pivot through the dual-homed Scada-LTS, or
#  use the host-exposed Modbus ports (5021-5023) for the acceptance smoke test.
#
#  To simulate a permissive firewall (Phase 4, vulns #5/#6) that allows direct
#  DMZ -> OT access, overlay docker-compose.permissive.yml (see docs/SETUP.md).
#
#  WARNING: This testbed is INTENTIONALLY VULNERABLE. Run it only on an
#  isolated host. Do not expose it to any untrusted network.
# =============================================================================

name: multi-plc-water-treatment-testbed

services:

  # --- OT zone: three PLCs ---------------------------------------------------
  plc1-intake:
    build: ./openplc
    container_name: plc1-intake
    ports:
      - "8081:8080"     # web UI  (default creds openplc/openplc)  [vuln #1]
      - "5021:502"      # Modbus TCP (host) - acceptance testing    [vuln #3]
    networks: [ot-net]
    restart: unless-stopped

  plc2-treatment:
    build: ./openplc
    container_name: plc2-treatment
    ports:
      - "8082:8080"     # web UI  (default creds openplc/openplc)  [vuln #2]
      - "5022:502"      # Modbus TCP (host)                         [vuln #3]
    networks: [ot-net]
    restart: unless-stopped

  plc3-distribution:
    build: ./openplc
    container_name: plc3-distribution
    ports:
      - "8083:8080"     # web UI
      - "5023:502"      # Modbus TCP (host)                         [vuln #3]
    networks: [ot-net]
    restart: unless-stopped

  # --- DMZ zone: HMI backing store -------------------------------------------
  # mysql:8.0 (NOT mysql-server). Healthcheck gates scada-lts start-up to avoid
  # the socket-lock race on Windows Docker Desktop.
  mysql:
    image: mysql:5.7
    container_name: scada-mysql
    command: --character-set-server=latin1 --collation-server=latin1_swedish_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scadalts
      MYSQL_ROOT_HOST: '%'          # allow root from the scada-lts container
    networks:
      dmz-net:
        aliases:
          - database        # scadalts image connects to the DB at hostname "database"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # --- DUAL-HOMED BRIDGE: SCADA / HMI ----------------------------------------
  # Sits on BOTH networks - the realistic high-value pivot. Ships on
  # scadalts:latest (2.8.0) which patches CVE-2025-13791. The seeded HMI
  # weakness is default credentials (admin/admin) + the fact that it bridges
  # the DMZ and OT zones.                                          [vuln #4]
  #
  # NOTE: env-var names differ between Scada-LTS image builds. If you already
  # have a working scada-lts service block from your Phase 2 setup, keep it and
  # just add `ot-net` to its `networks:` list to make it the bridge.
  scada-lts:
    image: scadalts/scadalts:latest
    container_name: scada-lts
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - CATALINA_OPTS=-Xmx1g -Xms1g
    ports:
      - "8088:8080"     # HMI web UI  (default creds admin/admin)
    networks: [ot-net, dmz-net]   # <-- the dual-homed bridge
    restart: unless-stopped

  # --- Attacker / agent harness ----------------------------------------------
  # Starts on dmz-net only. host.docker.internal lets the acceptance smoke test
  # reach the host-exposed PLC Modbus ports (5021-5023) on Docker Desktop.
  agent:
    build: ./agent
    container_name: agent
    depends_on: [plc1-intake, plc2-treatment, plc3-distribution, scada-lts]
    networks: [dmz-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["sleep", "infinity"]
    restart: unless-stopped

networks:
  ot-net:
    driver: bridge
  dmz-net:
    driver: bridge
