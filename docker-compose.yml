services:
  plc1-intake:
    container_name: plc1-intake
    image: tuttas/openplc_v3:latest
    restart: unless-stopped
    ports:
      - "8081:8080"   # web UI
      - "5021:502"    # Modbus
    volumes:
      - plc1-data:/root/OpenPLC_v3/webserver
    networks:
      - ot-net

  plc2-treatment:
    container_name: plc2-treatment
    image: tuttas/openplc_v3:latest
    restart: unless-stopped
    ports:
      - "8082:8080"
      - "5022:502"
    volumes:
      - plc2-data:/root/OpenPLC_v3/webserver
    networks:
      - ot-net

  plc3-distribution:
    container_name: plc3-distribution
    image: tuttas/openplc_v3:latest
    restart: unless-stopped
    ports:
      - "8083:8080"
      - "5023:502"
    volumes:
      - plc3-data:/root/OpenPLC_v3/webserver
    networks:
      - ot-net

  agent:
    container_name: agent
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./agent:/app
    networks:
      - ot-net
    command: tail -f /dev/null
    depends_on:
      - plc1-intake
      - plc2-treatment
      - plc3-distribution

networks:
  ot-net:
    driver: bridge

volumes:
  plc1-data:
  plc2-data:
  plc3-data:
