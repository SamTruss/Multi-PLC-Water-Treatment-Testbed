services:
  plc1-intake:
    container_name: plc1-intake
    image: tuttas/openplc_v3:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "5021:502"
    volumes:
      - plc1-data:/root/OpenPLC_v3/webserver
    networks:
      ot-net:
        ipv4_address: 172.28.10.11

  plc2-treatment:
    container_name: plc2-treatment
    image: tuttas/openplc_v3:latest
    restart: unless-stopped
    ports:
      - "8082:8080"
      - "5022:502"
    volumes:
      - plc2-data:/root/OpenPLC_v3/webserver
    networks:
      ot-net:
        ipv4_address: 172.28.10.12

  plc3-distribution:
    container_name: plc3-distribution
    image: tuttas/openplc_v3:latest
    restart: unless-stopped
    ports:
      - "8083:8080"
      - "5023:502"
    volumes:
      - plc3-data:/root/OpenPLC_v3/webserver
    networks:
      ot-net:
        ipv4_address: 172.28.10.13

  agent:
    container_name: agent
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./agent:/app
      - ./tests:/app/tests
    networks:
      dmz-net:
        ipv4_address: 172.28.20.10
    command: tail -f /dev/null
    depends_on:
      - plc1-intake
      - plc2-treatment
      - plc3-distribution

networks:
  ot-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24
  dmz-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.20.0/24

volumes:
  plc1-data:
  plc2-data:
  plc3-data:
